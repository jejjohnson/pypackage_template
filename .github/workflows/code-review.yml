name: "🔍 AI Code Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.pull_request.user.login, '[bot]') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        id: diff
        run: |
          DIFF=$(git --no-pager diff --no-prefix --unified=100000 --minimal $(git merge-base --fork-point origin/master)...HEAD 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            DIFF=$(git --no-pager diff --no-prefix --unified=100000 --minimal origin/master...HEAD 2>/dev/null || echo "")
          fi
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No diff found, skipping review."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$DIFF" > /tmp/pr-diff.txt
          echo "Diff generated ($(wc -l < /tmp/pr-diff.txt) lines)"

      - name: Read review instructions
        if: steps.diff.outputs.skip != 'true'
        id: instructions
        run: |
          if [ -f "CODE_REVIEW.md" ]; then
            echo "instructions_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "instructions_found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ CODE_REVIEW.md not found, using default review."
          fi

      - name: Run AI code review
        if: steps.diff.outputs.skip != 'true'
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Truncate diff if too large (models have context limits)
          MAX_CHARS=60000
          DIFF=$(cat /tmp/pr-diff.txt)
          if [ ${#DIFF} -gt $MAX_CHARS ]; then
            DIFF="${DIFF:0:$MAX_CHARS}"$'\n\n... (diff truncated due to size)'
            printf '%s' "$DIFF" > /tmp/pr-diff.txt
          fi

          # Build the prompt into a file to avoid shell interpretation of
          # special characters (backticks, pipes, etc.) present in CODE_REVIEW.md
          {
            printf 'You are a code review agent. Review the following pull request diff according to the instructions below.\n\n'
            printf '## PR Context\n'
            printf -- '- **Title**: %s\n' "$PR_TITLE"
            printf -- '- **Description**: %s\n\n' "$PR_BODY"
            printf '## Review Instructions\n'
            cat CODE_REVIEW.md 2>/dev/null || printf '(No CODE_REVIEW.md found)\n'
            printf '\n## Diff to Review\n```diff\n'
            cat /tmp/pr-diff.txt
            printf '\n```\n\n'
            printf 'Provide your code review following the Output Format specified in the instructions. If there are no issues, say so and highlight what was done well.\n'
          } > /tmp/prompt.txt

          # Use GitHub Models API via gh models run
          gh models run gpt-4o -f /tmp/prompt.txt > /tmp/review-output.md 2>/dev/null || {
            # Fallback: post a simpler message
            printf '⚠️ AI review generation failed. Please review manually.\n' > /tmp/review-output.md
          }

      - name: Post review comment
        if: steps.diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build the comment body in a file to avoid shell interpretation of
          # special characters in the AI-generated review output
          {
            printf '## 🔍 AI Code Review\n\n'
            cat /tmp/review-output.md
            printf '\n\n---\n'
            printf '*This review was generated automatically using the guidelines in `CODE_REVIEW.md`.*\n'
            printf '*Generated at: %s*\n' "$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > /tmp/comment.txt

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt
